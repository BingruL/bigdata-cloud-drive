# ==================================================
# Flume 日志采集配置
# 对应课程第 5 章：数据采集与预处理
#
# 本配置将应用服务器的操作日志实时采集到 HDFS
# 用于后续 Spark 批量分析
#
# 使用方式：
#   flume-ng agent -n agent1 -c conf -f flume-log-collector.conf
# ==================================================

# 定义 Agent 组件
agent1.sources = log_source
agent1.channels = mem_channel
agent1.sinks = hdfs_sink

# Source: 监控日志目录（Spooling Directory）
agent1.sources.log_source.type = spooldir
agent1.sources.log_source.spoolDir = /var/log/cloud-drive
agent1.sources.log_source.fileHeader = true
agent1.sources.log_source.fileSuffix = .DONE
agent1.sources.log_source.basenameHeader = true
agent1.sources.log_source.channels = mem_channel

# Channel: 内存通道
agent1.channels.mem_channel.type = memory
agent1.channels.mem_channel.capacity = 10000
agent1.channels.mem_channel.transactionCapacity = 1000

# Sink: 写入 HDFS
agent1.sinks.hdfs_sink.type = hdfs
agent1.sinks.hdfs_sink.hdfs.path = /cloud-drive/logs/%Y-%m-%d
agent1.sinks.hdfs_sink.hdfs.filePrefix = access-log
agent1.sinks.hdfs_sink.hdfs.fileSuffix = .log
agent1.sinks.hdfs_sink.hdfs.rollInterval = 600
agent1.sinks.hdfs_sink.hdfs.rollSize = 134217728
agent1.sinks.hdfs_sink.hdfs.rollCount = 0
agent1.sinks.hdfs_sink.hdfs.fileType = DataStream
agent1.sinks.hdfs_sink.hdfs.writeFormat = Text
agent1.sinks.hdfs_sink.channel = mem_channel
